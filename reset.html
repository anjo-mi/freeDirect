<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="reset.css" />
  </head>
  <body>
    <div class="card">
      <img src="/icons/free-direction.png" alt="Logo" />
      <h1>FreeTube Redirect</h1>
      <p class="explainer">
        If your FreeTube window isn't opening, a likely cause is that the
        extension was denied permission on the initial run. Click the button,
        then open another YouTube link to re-attempt the first execution.
      </p>
      <button id="reset">Reset first run</button>
      <p id="status" class="status"></p>
    </div>
    <script src="reset.js"></script>
  </body>
</html>
